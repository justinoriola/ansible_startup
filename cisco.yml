---
- hosts: routers
  become: yes

  tasks:
    - name: Create Loopback999
      cisco.ios.ios_interfaces:
        config:
          - name: Loopback999
            description: Configured in Ansible-startup Lab
            enabled: true

    - name: Add IP address to Loopback999
      cisco.ios.ios_l3_interfaces:
        config:
          - name: Loopback999
            ipv4:
              - address: 192.168.10.101/24


